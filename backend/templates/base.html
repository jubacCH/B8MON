<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ request.state.site_name }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0b0d14',
            panel: '#13151f',
            card: '#1a1d2e',
            border: '#252836',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0b0d14; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b0d14; }
    ::-webkit-scrollbar-thumb { background: #252836; border-radius: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-52 shrink-0 bg-[#13151f] border-r border-[#252836] flex flex-col">
      <div class="px-5 py-4 border-b border-[#252836]">
        <div class="flex items-center gap-2">
          <div class="w-6 h-6 rounded-md bg-blue-600 flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </div>
          <span class="text-white font-semibold text-sm">{{ request.state.site_name }}</span>
        </div>
      </div>

      <nav class="flex-1 px-2 py-3 space-y-0.5">
        <p class="px-3 pt-2 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-600">Monitor</p>
        <a href="/"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition-colors
                  {% if active_page == 'dashboard' %}bg-blue-600 text-white{% else %}text-slate-400 hover:text-white hover:bg-[#252836]{% endif %}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
          </svg>
          Dashboard
        </a>
        <a href="/ping"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition-colors
                  {% if active_page == 'ping' %}bg-blue-600 text-white{% else %}text-slate-400 hover:text-white hover:bg-[#252836]{% endif %}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
          </svg>
          Hosts
        </a>

        <a href="/proxmox"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition-colors
                  {% if active_page == 'proxmox' %}bg-blue-600 text-white{% else %}text-slate-400 hover:text-white hover:bg-[#252836]{% endif %}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Proxmox
        </a>

        <p class="px-3 pt-4 pb-1 text-[10px] font-semibold uppercase tracking-widest text-slate-600">System</p>
        <a href="/settings"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition-colors
                  {% if active_page == 'settings' %}bg-blue-600 text-white{% else %}text-slate-400 hover:text-white hover:bg-[#252836]{% endif %}">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </a>
      </nav>

      <!-- Footer -->
      <div class="px-5 py-3 border-t border-[#252836]">
        <p class="text-[10px] text-slate-600">Homelab Monitor</p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
