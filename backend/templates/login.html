<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Vigil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background-color: #0b0d14; color: #e2e8f0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-[#13151f] border border-[#252836] rounded-xl p-8 shadow-2xl">
      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
          <svg class="w-4.5 h-4.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <span class="text-white font-semibold text-lg">Vigil</span>
      </div>

      <h1 class="text-xl font-semibold text-white mb-1">Anmelden</h1>
      <p class="text-slate-500 text-sm mb-6">Zugang zum Monitoring-Dashboard</p>

      {% if error %}
      <div class="mb-4 px-3 py-2.5 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Benutzername</label>
          <input type="text" name="username" autofocus required
                 class="w-full px-3 py-2 bg-[#0b0d14] border border-[#252836] rounded-lg text-white text-sm
                        focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-600"
                 placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Passwort</label>
          <input type="password" name="password" required
                 class="w-full px-3 py-2 bg-[#0b0d14] border border-[#252836] rounded-lg text-white text-sm
                        focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <button type="submit"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors mt-2">
          Anmelden
        </button>
      </form>
    </div>
  </div>
</body>
</html>
