{% extends "base.html" %}
{% block title %}Settings – Homelab Monitor{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-semibold text-white">Settings</h1>
  <p class="text-slate-400 text-sm mt-1">Application configuration</p>
</div>

{% if saved %}
<div class="mb-5 px-4 py-3 bg-emerald-500/10 border border-emerald-500/30 rounded-lg text-emerald-400 text-sm">
  Settings saved.
</div>
{% endif %}

<div class="bg-[#1a1d27] border border-[#2a2d3a] rounded-xl p-6 max-w-lg">
  <form method="post" action="/settings/save" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-1.5">Site name</label>
      <input type="text" name="site_name" value="{{ site_name }}"
             class="w-full px-3 py-2 bg-[#0f1117] border border-[#2a2d3a] rounded-lg text-white text-sm
                    focus:outline-none focus:border-blue-500 transition-colors">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-1.5">Ping interval (seconds)</label>
      <input type="number" name="ping_interval" value="{{ ping_interval }}" min="10" max="3600"
             class="w-full px-3 py-2 bg-[#0f1117] border border-[#2a2d3a] rounded-lg text-white text-sm
                    focus:outline-none focus:border-blue-500 transition-colors">
      <p class="text-slate-500 text-xs mt-1">Min 10s, max 3600s</p>
    </div>
    <button type="submit"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors">
      Save
    </button>
  </form>
</div>
{% endblock %}
