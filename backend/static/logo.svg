<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="logo-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hub node -->
  <circle cx="20" cy="20" r="14" fill="#38BDF8" opacity="0.06"/>
  <circle cx="20" cy="20" r="8" fill="#38BDF8" opacity="0.7" filter="url(#logo-glow)"/>
  <circle cx="18" cy="18" r="3" fill="white" opacity="0.3"/>
  <circle cx="22" cy="22" r="1.2" fill="white" opacity="0.08"/>
  <!-- Inner nodes -->
  <circle cx="6" cy="10" r="3.5" fill="#A78BFA" opacity="0.55"/>
  <circle cx="34" cy="10" r="3.5" fill="#34D399" opacity="0.55"/>
  <circle cx="6" cy="30" r="3" fill="#34D399" opacity="0.45"/>
  <circle cx="34" cy="30" r="3" fill="#A78BFA" opacity="0.45"/>
  <!-- Connections -->
  <line x1="20" y1="20" x2="6" y2="10" stroke="#38BDF8" stroke-width="0.6" opacity="0.2"/>
  <line x1="20" y1="20" x2="34" y2="10" stroke="#38BDF8" stroke-width="0.6" opacity="0.2"/>
  <line x1="20" y1="20" x2="6" y2="30" stroke="#A78BFA" stroke-width="0.5" opacity="0.15"/>
  <line x1="20" y1="20" x2="34" y2="30" stroke="#A78BFA" stroke-width="0.5" opacity="0.15"/>
  <!-- Wordmark -->
  <text x="48" y="24" font-family="'Exo 2', sans-serif" font-weight="200" font-size="16" letter-spacing="6" fill="#F1F5F9">NODEGLOW</text>
</svg>
