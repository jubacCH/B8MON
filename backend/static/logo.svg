<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg" x1="15" y1="25" x2="105" y2="95" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- V shape -->
  <path d="M18 30L60 90L102 30" stroke="url(#vg)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Ping dot -->
  <circle cx="60" cy="90" r="9" fill="#6366f1" filter="url(#glow)"/>
  <!-- Outer ping ring -->
  <circle cx="60" cy="90" r="18" stroke="#6366f1" stroke-width="1.5" opacity="0.25"/>
  <circle cx="60" cy="90" r="28" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
</svg>
