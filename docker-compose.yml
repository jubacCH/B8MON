services:
  monitor:
    build: ./backend
    container_name: homelab-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend:/app   # live code mount – changes take effect without rebuild
    restart: unless-stopped
    cap_add:
      - NET_RAW   # Required for ICMP ping
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
